<!DOCTYPE html>

<html>
<head>
    <meta charset="UTF-8">
    <title>Spring AI Chatbot</title>

    <style>
        body{
        font-family: Arial;
        background:#0f172a;
        margin:0;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        color:white;
        }

        .container{
        width:700px;
        height:600px;
        background:#1e293b;
        border-radius:10px;
        display:flex;
        flex-direction:column;
        }

        .header{
        padding:15px;
        background:#020617;
        text-align:center;
        font-size:20px;
        font-weight:bold;
        }

        .chat{
        flex:1;
        overflow-y:auto;
        padding:20px;
        display:flex;
        flex-direction:column;
        }

        .message{
        margin:10px 0;
        padding:10px;
        border-radius:8px;
        max-width:80%;
        }

        .user{
        background:#2563eb;
        align-self:flex-end;
        }

        .ai{
        background:#334155;
        align-self:flex-start;
        }

        .input-area{
        display:flex;
        padding:10px;
        background:#020617;
        }

        input{
        flex:1;
        padding:10px;
        border:none;
        border-radius:5px;
        outline:none;
        }

        button{
        margin-left:10px;
        padding:10px 20px;
        border:none;
        background:#22c55e;
        color:white;
        border-radius:5px;
        cursor:pointer;
        }

        button:hover{
        background:#16a34a;
        }
    </style>

</head>

<body>

<div class="container">

    <div class="header">
        Spring AI Chatbot
    </div>

    <div id="chat" class="chat"></div>

    <div style="padding:10px;">
        <input type="file" id="pdfFile">
        <input type="text" id="pdfQuestion" placeholder="Ask question about pdf">
        <button onclick="askPdf()">Ask PDF</button>
    </div>

    <div class="input-area">
        <input id="message" placeholder="Ask something..." />
        <button onclick="send()">Send</button>
    </div>

</div>

<script>

    let sessionId = localStorage.getItem("sessionId");

if (!sessionId) {
   sessionId = Date.now().toString();
   localStorage.setItem("sessionId", sessionId);
}
   async function send(){

   let input = document.getElementById("message")
   let text = input.value.trim()

   if(text === "") return

   let chat = document.getElementById("chat")

   chat.innerHTML += `<div class="message user">${text}</div>`

   input.value=""

   let aiMessage = document.createElement("div")
   aiMessage.className = "message ai"
   chat.appendChild(aiMessage)

   let response = await fetch(`/ask-stream?message=${message}&{sessionId}`)

   const reader = response.body.getReader()
   const decoder = new TextDecoder()

   while(true){

   const {done,value} = await reader.read()

   if(done) break

   let chunk = decoder.decode(value)

   // CLEAN SSE FORMAT
   chunk = chunk.replaceAll("data:", "")
   chunk = chunk.replaceAll("\n", "")

   aiMessage.innerHTML += chunk

   chat.scrollTop = chat.scrollHeight

   }

   }

       async function askPdf(){

   let file = document.getElementById("pdfFile").files[0]
   let question = document.getElementById("pdfQuestion").value

   let formData = new FormData()
   formData.append("file", file)
   formData.append("question", question)

   let response = await fetch("/ask-pdf",{
   method:"POST",
   body:formData
   })

   let result = await response.text()

   let chat = document.getElementById("chat")

   chat.innerHTML += `<div class="message ai">${result}</div>`

   }

</script>

</body>
</html>
