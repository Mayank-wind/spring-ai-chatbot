<!DOCTYPE html><html>
<head>
    <title>Local AI Chatbot</title>
    <style>
        body{
        font-family: Arial;
        background:#0f172a;
        color:white;
        display:flex;
        flex-direction:column;
        align-items:center;
        }#chat{
        width:600px;
        height:400px;
        overflow:auto;
        border:1px solid #444;
        padding:10px;
        margin-top:20px;
        background:#1e293b;
        }

        .message{
        margin:10px 0;
        }

        .user{
        color:#38bdf8;
        }

        .ai{
        color:#22c55e;
        }

        input{
        width:500px;
        padding:10px;
        margin-top:10px;
        }

        button{
        padding:10px 20px;
        }
    </style>

</head><body><h2>Local AI Chatbot</h2><div id="chat"></div><input id="msg" placeholder="Ask something..."/>
<button onclick="send()">Send</button><script>

    async function send(){

    let message = document.getElementById("msg").value

    let chat = document.getElementById("chat")

    chat.innerHTML += `<div class="message user">You: ${message}</div>`

    let response = await fetch(`/ask?message=${message}`)

    let text = await response.text()

    chat.innerHTML += `<div class="message ai">AI: ${text}</div>`

    document.getElementById("msg").value=""

    chat.scrollTop = chat.scrollHeight

    }

</script></body>
</html>
