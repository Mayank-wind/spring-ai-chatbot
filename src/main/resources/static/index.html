<!DOCTYPE html>

<html>
<head>
    <meta charset="UTF-8">
    <title>Spring AI Chatbot</title>

    <style>
        body{
        font-family: Arial;
        background:#0f172a;
        margin:0;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        color:white;
        }

        .container{
    width:700px;
    height:600px;
    background:#1e293b;
    border-radius:12px;
    display:flex;
    flex-direction:column;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

        .header{
        padding:15px;
        background:#020617;
        text-align:center;
        font-size:20px;
        font-weight:bold;
        }

        .chat{
        flex:1;
        overflow-y:auto;
        padding:20px;
        display:flex;
        flex-direction:column;
        }

        .message{
    margin:10px 0;
    padding:12px;
    border-radius:12px;
    max-width:75%;
    line-height:1.4;
    font-size:14px;
    animation: fadeIn 0.2s ease-in;
}

        .user{
    background: linear-gradient(135deg,#2563eb,#1d4ed8);
    align-self:flex-end;
}

        .ai{
        background:#334155;
        align-self:flex-start;
        }

        .input-area{
        display:flex;
        padding:10px;
        background:#020617;
        }

        input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:8px;
    outline:none;
    background:#020617;
    color:white;
}

        button{
        margin-left:10px;
        padding:10px 20px;
        border:none;
        background:#22c55e;
        color:white;
        border-radius:5px;
        cursor:pointer;
        }

        button:hover{
        background:#16a34a;
        }

        @keyframes fadeIn {
    from {opacity:0; transform:translateY(5px);}
    to {opacity:1; transform:translateY(0);}
}
    </style>

</head>



<body>

<div style="display:flex; height:100vh; width:100%;">


    <div id="sidebar" style="width:250px; background:#020617; padding:10px; overflow-y:auto;">
        <button onclick="newChat()" style="width:100%; padding:10px; margin-bottom:10px;">
            + New Chat
        </button>
        <div id="chatList"></div>
    </div>


    <div class="container">

        <div class="header">
            Spring AI Chatbot
        </div>

        <div id="chat" class="chat"></div>

        <div style="padding:10px;">
            <input type="file" id="pdfFile">
            <input type="text" id="pdfQuestion" placeholder="Ask question about pdf">
            <button onclick="askPdf()">Ask PDF</button>
        </div>

        <div class="input-area">
            <input id="message" placeholder="Ask something..." />
            <button onclick="send()">Send</button>
        </div>

    </div>

</div>
<script>

    let sessionId = localStorage.getItem("sessionId");

if (!sessionId) {
   sessionId = Date.now().toString();
   localStorage.setItem("sessionId", sessionId);
}

let chats = JSON.parse(localStorage.getItem("chats")) || []
let currentSessionId = null

function saveChats(){
    localStorage.setItem("chats", JSON.stringify(chats))
}


function renderChats(){
    let chatList = document.getElementById("chatList")
    chatList.innerHTML = ""

    chats.forEach(chat => {

        let wrapper = document.createElement("div")
        wrapper.style.display = "flex"
        wrapper.style.justifyContent = "space-between"
        wrapper.style.alignItems = "center"
        wrapper.style.padding = "8px"
        wrapper.style.borderBottom = "1px solid #334155"
        wrapper.style.borderRadius = "6px"
        wrapper.style.transition = "all 0.2s ease"

        if(chat.id === currentSessionId){
    wrapper.style.background = "#1e293b"
    wrapper.style.boxShadow = "0 0 0 1px #334155 inset"
}

        // HOVER EFFECT
        wrapper.onmouseover = () => {
            wrapper.style.background = "#334155"
            wrapper.style.transform = "translateX(4px)"
            actions.style.display = "flex"
        }

        wrapper.onmouseout = () => {
    wrapper.style.background = chat.id === currentSessionId ? "#1e293b" : "transparent"
    wrapper.style.transform = "translateX(0)"
    actions.style.display = "none"
}

        let title = document.createElement("span")
        title.innerText = chat.title
        title.style.cursor = "pointer"
        title.onclick = () => switchChat(chat.id)

        let edit = document.createElement("button")
        edit.innerText = "🦭"
        edit.style.background = "transparent"
        edit.style.border = "none"
        edit.style.cursor = "pointer"
        edit.style.color = "white"

        edit.onclick = (e) => {
            e.stopPropagation()
            let newName = prompt("Rename chat:", chat.title)
            if(newName){
                chat.title = newName
                chat.isCustomTitle = true
                saveChats()
                renderChats()
            }
        }

        let del = document.createElement("button")
        del.innerText = "👺"
        del.style.background = "transparent"
        del.style.border = "none"
        del.style.cursor = "pointer"
        del.style.color = "red"
        del.style.marginLeft = "5px"

        del.onclick = (e) => {
            e.stopPropagation()
            deleteChat(chat.id)
        }

        // ACTIONS CONTAINER
        let actions = document.createElement("div")
        actions.style.display = "none"
        actions.appendChild(edit)
        actions.appendChild(del)

        // APPEND
        wrapper.appendChild(title)
        wrapper.appendChild(actions)

        chatList.appendChild(wrapper)
    })
}

function newChat(){

    let newId = Date.now().toString()
    let newChatObj = {
        id: newId,
        title: "New Chat",
        isCustomTitle: false
    }

    chats.push({...newChatObj})
    saveChats()

    currentSessionId = newId
    localStorage.setItem("sessionId", newId)

    renderChats()

    document.getElementById("chat").innerHTML = ""
}



function switchChat(id){
    currentSessionId = id
    localStorage.setItem("sessionId", id)
    loadChat(id)
}

   async function send(){
   let input = document.getElementById("message")
   let text = input.value.trim()
   if(text === "") return


   // AUTO TITLE (only first message)
let currentChat = chats.find(c => c.id === currentSessionId)
if(currentChat && !currentChat.isCustomTitle){
    let words = text.split(" ").slice(0, 4).join(" ")
    currentChat.title = words
    saveChats()
    renderChats()
}
   let chat = document.getElementById("chat")
   chat.innerHTML += `<div class="message user">${text}</div>`
   input.value=""

   let aiMessage = document.createElement("div")
   aiMessage.className = "message ai"
   chat.appendChild(aiMessage)

   let sid = currentSessionId || localStorage.getItem("sessionId")

let response = await fetch(`/ask-stream?message=${text}&sessionId=${sid}`)

   const reader = response.body.getReader()
   const decoder = new TextDecoder()

   while(true){

   const {done,value} = await reader.read()

   if(done) break

   let chunk = decoder.decode(value)

   // CLEAN SSE FORMAT
   chunk = chunk.replaceAll("data:", "")
   chunk = chunk.replaceAll("\n", "")

   aiMessage.innerHTML += chunk

   chat.scrollTop = chat.scrollHeight

   }

   }

       async function askPdf(){

   let file = document.getElementById("pdfFile").files[0]
   let question = document.getElementById("pdfQuestion").value

   let formData = new FormData()
   formData.append("file", file)
   formData.append("question", question)

   let response = await fetch("/ask-pdf",{
   method:"POST",
   body:formData
   })

   let result = await response.text()

   let chat = document.getElementById("chat")

   chat.innerHTML += `<div class="message ai">${result}</div>`

   }

    window.onload = () => {
    renderChats()

    if(chats.length === 0){
        newChat()
    } else {
        switchChat(chats[0].id)
    }
}

    async function loadChat(sessionId){

    localStorage.setItem("sessionId", sessionId)

    let response = await fetch(`/history?sessionId=${sessionId}`)
    let messages = await response.json()

    let chat = document.getElementById("chat")
    chat.innerHTML = ""

    messages.forEach(msg => {

        let div = document.createElement("div")

        if(msg.startsWith("User:")){
            div.className = "message user"
            div.innerText = msg.replace("User: ", "")
        } else {
            div.className = "message ai"
            div.innerText = msg.replace("AI: ", "")
        }

        chat.appendChild(div)
    })
}

    function addChatToSidebar(id){

    let chatList = document.getElementById("chatList")

    let div = document.createElement("div")
    div.innerText = "Chat " + id

    div.style.padding = "8px"
    div.style.cursor = "pointer"

    div.onclick = () => switchChat(id)

    chatList.appendChild(div)
}

    function deleteChat(id){

    fetch(`/reset?sessionId=${id}`)

    // 1. Remove from chats array
    chats = chats.filter(c => c.id !== id)

    saveChats()

    // 2. If current chat deleted → switch
    if(currentSessionId === id){

        if(chats.length > 0){
            switchChat(chats[0].id)
        } else {
            document.getElementById("chat").innerHTML = ""
            currentSessionId = null
        }
    }

    renderChats()
}
</script>

</body>
</html>
