<!DOCTYPE html>

<html>
<head>
    <meta charset="UTF-8">
    <title>Spring AI Chatbot</title>

    <style>
        body{
        font-family: Arial;
        background:#0f172a;
        margin:0;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        color:white;
        }

        .container{
        width:700px;
        height:600px;
        background:#1e293b;
        border-radius:10px;
        display:flex;
        flex-direction:column;
        }

        .header{
        padding:15px;
        background:#020617;
        text-align:center;
        font-size:20px;
        font-weight:bold;
        }

        .chat{
        flex:1;
        overflow-y:auto;
        padding:20px;
        display:flex;
        flex-direction:column;
        }

        .message{
        margin:10px 0;
        padding:10px;
        border-radius:8px;
        max-width:80%;
        }

        .user{
        background:#2563eb;
        align-self:flex-end;
        }

        .ai{
        background:#334155;
        align-self:flex-start;
        }

        .input-area{
        display:flex;
        padding:10px;
        background:#020617;
        }

        input{
        flex:1;
        padding:10px;
        border:none;
        border-radius:5px;
        outline:none;
        }

        button{
        margin-left:10px;
        padding:10px 20px;
        border:none;
        background:#22c55e;
        color:white;
        border-radius:5px;
        cursor:pointer;
        }

        button:hover{
        background:#16a34a;
        }
    </style>

</head>



<body>

<div style="display:flex; height:100vh; width:100%;">


    <div id="sidebar" style="width:250px; background:#020617; padding:10px; overflow-y:auto;">
        <button onclick="newChat()" style="width:100%; padding:10px; margin-bottom:10px;">
            + New Chat
        </button>
        <div id="chatList"></div>
    </div>


    <div class="container">

        <div class="header">
            Spring AI Chatbot
        </div>

        <div id="chat" class="chat"></div>

        <div style="padding:10px;">
            <input type="file" id="pdfFile">
            <input type="text" id="pdfQuestion" placeholder="Ask question about pdf">
            <button onclick="askPdf()">Ask PDF</button>
        </div>

        <div class="input-area">
            <input id="message" placeholder="Ask something..." />
            <button onclick="send()">Send</button>
        </div>

    </div>

</div>
<script>

    let sessionId = localStorage.getItem("sessionId");

if (!sessionId) {
   sessionId = Date.now().toString();
   localStorage.setItem("sessionId", sessionId);
}

let chats = JSON.parse(localStorage.getItem("chats")) || []
let currentSessionId = null

function saveChats(){
    localStorage.setItem("chats", JSON.stringify(chats))
}

function renderChats(){
    let chatList = document.getElementById("chatList")
    chatList.innerHTML = ""

    chats.forEach(id => {
        let div = document.createElement("div")
        div.innerText = "Chat " + id
        div.style.padding = "10px"
        div.style.cursor = "pointer"
        div.style.borderBottom = "1px solid #334155"

        div.onclick = () => switchChat(id)

        chatList.appendChild(div)
    })
}

function newChat(){

    let newId = Date.now().toString()
    chats.push(newId)
    saveChats()
    currentSessionId = newId
    localStorage.setItem("sessionId", newId)
    renderChats()
    document.getElementById("chat").innerHTML = ""
}

function switchChat(id){
    currentSessionId = id
    localStorage.setItem("sessionId", id)
    loadChat(id)
}


   async function send(){


   let input = document.getElementById("message")
   let text = input.value.trim()

   if(text === "") return

   let chat = document.getElementById("chat")

   chat.innerHTML += `<div class="message user">${text}</div>`

   input.value=""

   let aiMessage = document.createElement("div")
   aiMessage.className = "message ai"
   chat.appendChild(aiMessage)

   let response = await fetch(`/ask-stream?message=${text}&sessionId=${currentSessionId}`)

   const reader = response.body.getReader()
   const decoder = new TextDecoder()

   while(true){

   const {done,value} = await reader.read()

   if(done) break

   let chunk = decoder.decode(value)

   // CLEAN SSE FORMAT
   chunk = chunk.replaceAll("data:", "")
   chunk = chunk.replaceAll("\n", "")

   aiMessage.innerHTML += chunk

   chat.scrollTop = chat.scrollHeight

   }

   }

       async function askPdf(){

   let file = document.getElementById("pdfFile").files[0]
   let question = document.getElementById("pdfQuestion").value

   let formData = new FormData()
   formData.append("file", file)
   formData.append("question", question)

   let response = await fetch("/ask-pdf",{
   method:"POST",
   body:formData
   })

   let result = await response.text()

   let chat = document.getElementById("chat")

   chat.innerHTML += `<div class="message ai">${result}</div>`

   }

    window.onload = () => {
    renderChats()

    if(chats.length === 0){
        newChat()
    } else {
        switchChat(chats[0])
    }
}

    async function loadChat(sessionId){

    localStorage.setItem("sessionId", sessionId)

    let response = await fetch(`/history?sessionId=${sessionId}`)
    let messages = await response.json()

    let chat = document.getElementById("chat")
    chat.innerHTML = ""

    messages.forEach(msg => {

        let div = document.createElement("div")

        if(msg.startsWith("User:")){
            div.className = "message user"
            div.innerText = msg.replace("User: ", "")
        } else {
            div.className = "message ai"
            div.innerText = msg.replace("AI: ", "")
        }

        chat.appendChild(div)
    })
}

    function addChatToSidebar(id){

    let chatList = document.getElementById("chatList")

    let div = document.createElement("div")
    div.innerText = "Chat " + id

    div.style.padding = "8px"
    div.style.cursor = "pointer"

    div.onclick = () => switchChat(id)

    chatList.appendChild(div)
}
</script>

</body>
</html>
